<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">    
    <style>
        body {
            background-color: #f8f9fa;
            color: #212529;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #212529;
            color: #f8f9fa;
        }
        .form-check-input:checked {
            background-color: #095ad2;
            border-color: #0d6efd;
        }
        #studentname, #rollnumber, #studentemail, #dob, #password, #confirmpassword, #submit, #counter {
            margin: 10px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"], input[type="date"], input[type="password"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: #0d6efd;
            color: white;
            border: none;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0b5ed7;
        }
        /* Custom helper class for validation error messages */
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 4px;
            display: block;
        }
    </style>
    <!-- Inline anti-flash script to check storage early -->
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (osDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
</head>
<body>

    <div class="form-check form-switch m-3">
       <input class="form-check-input" type="checkbox" id="darkModeToggle">
       <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
    </div>

    <h1>Student Registration Form</h1>

    <!-- Wrapped input fields inside an explicit HTML form element for validation handling -->
    <form id="registrationForm" novalidate>
        <div class="student name" id="studentname">
            <label for="txtName">Name : </label>
            <input type="text" id="txtName" required placeholder="Enter Your Name">
        </div>

        <div class="university roll number" id="rollnumber">
            <label for="txtRollNumber">Roll Number : </label>
            <input type="text" id="txtRollNumber" required placeholder="Enter Your Roll Number">
        </div>

        <div class="student email" id="studentemail">
            <label for="txtEmail">Email : </label>
            <input type="email" id="txtEmail" required placeholder="Enter Your student mail">
        </div>

        <!-- Fixed syntax error: changed id=""dob" to id="dob" -->
        <div class="dob" id="dob">
            <label for="txtDOB">DOB : </label>
            <input type="date" id="txtDOB" required placeholder="Enter Your Date of Birth">
        </div>

        <div class="password" id="password">
            <label for="txtPassword">Password : </label>
            <input type="password" id="txtPassword" required placeholder="Enter Your Password">
        </div>

        <div class="confirm password" id="confirmpassword">
            <label for="txtConfirmPassword">Confirm Password : </label>
            <input type="password" id="txtConfirmPassword" required placeholder="Enter Your Confirm Password">
        </div>

        <!-- Fixed casing error: changed id="Submit" to id="btnSubmit" to keep distinct scope -->
        <div class="submit" id="submit">
            <input type="submit" value="Submit" id="btnSubmit">
        </div>
    </form>

    <div class="counter" id="counter">
        <button id="count">Count (0)</button>
    </div>
    <div class="counterreset" id="reset">
        <button id="resetCount">Reset Count</button>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App Functionality Scripts -->
    <script>
        // ==========================================
        // FEATURE 1: Dark Mode Theme Switcher
        // ==========================================
        const toggle = document.getElementById('darkModeToggle');

        const applyTheme = (theme) => {
            // Apply native Bootstrap v5.3 data attribute
            document.documentElement.setAttribute('data-bs-theme', theme);
            // Backup for your custom body.dark-mode class rules
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
            } else {
                document.body.classList.remove('dark-mode');
                toggle.checked = false;
            }
            localStorage.setItem('theme', theme);
        };

        // Determine current theme state
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
        applyTheme(initialTheme);

        toggle.addEventListener('change', () => {
            const newTheme = toggle.checked ? 'dark' : 'light';
            applyTheme(newTheme);
        });


        // ==========================================
        // FEATURE 2: Form Input Field Validations
        // ==========================================
        const form = document.getElementById('registrationForm');

        // Helper function to show errors nicely beneath fields
        const showError = (inputEl, message) => {
            removeError(inputEl); // Wipe out any lingering errors first
            const errorDiv = document.createElement('span');
            errorDiv.className = 'error-message';
            errorDiv.innerText = message;
            inputEl.parentElement.appendChild(errorDiv);
            inputEl.style.borderColor = '#dc3545';
        };

        const removeError = (inputEl) => {
            const parent = inputEl.parentElement;
            const existingError = parent.querySelector('.error-message');
            if (existingError) existingError.remove();
            inputEl.style.borderColor = '';
        };

        form.addEventListener('submit', (e) => {
            let isValid = true;

            // Element Selectors
            const nameInput = document.getElementById('txtName');
            const rollInput = document.getElementById('txtRollNumber');
            const emailInput = document.getElementById('txtEmail');
            const dobInput = document.getElementById('txtDOB');
            const passwordInput = document.getElementById('txtPassword');
            const confirmPasswordInput = document.getElementById('txtConfirmPassword');

            // 1. Validate Name (alphabetical symbols & spaces only)
            const nameRegex = /^[A-Za-z\s]+$/;
            if (!nameInput.value.trim()) {
                showError(nameInput, 'Name field is required.');
                isValid = false;
            } else if (!nameRegex.test(nameInput.value.trim())) {
                showError(nameInput, 'Name should only contain letters and spaces.');
                isValid = false;
            } else {
                removeError(nameInput);
            }

            // 2. Validate Roll Number (numbers only)
            if (!rollInput.value.trim()) {
                showError(rollInput, 'Roll number is required.');
                isValid = false;
            } else if (isNaN(rollInput.value.trim())) {
                showError(rollInput, 'Roll number must be numerical.');
                isValid = false;
            } else {
                removeError(rollInput);
            }

            // 3. Validate Email Format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailInput.value.trim()) {
                showError(emailInput, 'Email field is required.');
                isValid = false;
            } else if (!emailRegex.test(emailInput.value.trim())) {
                showError(emailInput, 'Please provide a valid email format.');
                isValid = false;
            } else {
                removeError(emailInput);
            }

            // 4. Validate Date of Birth
            if (!dobInput.value) {
                showError(dobInput, 'Please specify your date of birth.');
                isValid = false;
            } else {
                removeError(dobInput);
            }

            // 5. Validate Password Strength (Minimum 6 characters example)
            if (passwordInput.value.length < 6) {
                showError(passwordInput, 'Password must contain at least 6 characters.');
                isValid = false;
            } else {
                removeError(passwordInput);
            }

            // 6. Check Matching Passwords
            if (passwordInput.value !== confirmPasswordInput.value) {
                showError(confirmPasswordInput, 'Passwords do not match.');
                isValid = false;
            } else if (!confirmPasswordInput.value) {
                showError(confirmPasswordInput, 'Please confirm your password.');
                isValid = false;
            } else {
                removeError(confirmPasswordInput);
            }

            // Halt transaction if standard validation conditions fail
            if (!isValid) {
                e.preventDefault();
            } else {
                alert('Form successfully validated and submitted!');
            }
        });
        // ==========================================
// FEATURE 3: Persistent Tracker Counter
// ==========================================
const countBtn = document.getElementById('count');
const resetBtn = document.getElementById('resetCount');

// Grab current value inside local storage browser sync cache, fallback to 0
let currentClicks = parseInt(localStorage.getItem('clickCounter')) || 0;

// FIX: Changed standard parentheses to template literal backticks ``
countBtn.innerText = `Count (${currentClicks})`;

countBtn.addEventListener('click', () => {
    currentClicks++;
    localStorage.setItem('clickCounter', currentClicks);
    // FIX: Changed to backticks
    countBtn.innerText = `Count (${currentClicks})`;
});

resetBtn.addEventListener('click', () => {
    currentClicks = 0;
    localStorage.setItem('clickCounter', currentClicks);
    // FIX: Changed to backticks
    countBtn.innerText = `Count (${currentClicks})`;
});

    </script>
</body>
</html>
