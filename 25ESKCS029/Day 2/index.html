<!DOCTYPE html>
<html lang="en">
<head>
  <title>Registration </title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:arial , sans-serif ;
    }
    body{
      background:rgb(220,123,45);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .container{
      width:250px;
      background:rgb(250,250, 250);
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(59, 59, 57,0.3) ;
    }
    h2{
      text-align:center;
      margin-bottom:18px;
      color:rgb(220,123,45);
    }
    label{
      font-weight:bold;
      color: rgb(59, 59, 57)
    }
    .gender{
       margin:7px 0px 12px;
    }
    button{
      width: 100%;
      padding:7px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      font-size:18px;
      cursor:pointer;
    }


  </style>
  
</head>
<body>

  <div class="container">
   <h2> Registration Form</h2>
  <form >

    <label>Username:</label> <br>
    <input type="text" placeholder="enter username" required><br> <br>

    <label>Email:</label> <br>
    <input type="email" placeholder="enter Email" required>
     <br><br>

    <label>Password:</label> <br>
    <input type="password" placeholder="enter Password" required>
      <br> <br>

    <label>Mobile number:</label> <br>
    <input type="tel" placeholder="enter mobile number"><br><br>

    <label>Gender:</label>
    <div class="gender">
      <input type="radio" name="gender">male
      <input type="radio" name="gender">Female
     <input type="radio" name="gender"> Other
    </div>

    <button style=" color : white ; background-color : blue" ;> Submit </button><strong>  </strong><button style="color:white; background-color: blue;"> Reset</button>
     
  </form>
  </div>
</body>
</html>
